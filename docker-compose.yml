version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db_chargedcode
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lukis
      POSTGRES_DB: ChargedCode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fastapi_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  postgres_data: